<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0", maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Project 507</title>
</head>
<body>

<div id="room">
    <div id="inventory">
        수집한 기억:<br>
        <div id="items"></div>
    </div>

    <div id="photo"  class="object">사진</div>
    <div id="diary"  class="object">다이어리</div>
    <div id="album"  class="object">앨범</div>
    <div id="mirror"></div>

    <div id="message">
        눈을 뜨니 익숙한 거실이다...<br>
        주변을 천천히 둘러보자.
    </div>
</div>

<script>
    let memory = {
        photo: false,
        diary: false,
        album: false
    };

    const message = document.getElementById("message");
    const mirror = document.getElementById("mirror");
    const items = document.getElementById("items");

    function updateInventory() {
        items.innerHTML = `
            사진: ${memory.photo ? "✔" : "❌"}<br>
            다이어리: ${memory.diary ? "✔" : "❌"}<br>
            앨범: ${memory.album ? "✔" : "❌"}
        `;

        if (memory.photo && memory.diary && memory.album) {
            mirror.classList.add("mirror-active");
            message.innerHTML = "거울이 부드럽게 빛나기 시작했다...";
        }
    }

    // 클릭 이벤트
    document.getElementById("photo").onclick = () => {
        if (memory.photo) return;
        memory.photo = true;
        document.getElementById("photo").classList.add("clicked");
        message.innerHTML = "우리 결혼식 때 찍은 사진이네...<br>너무 행복했었지.";
        updateInventory();
    };

    document.getElementById("diary").onclick = () => {
        if (memory.diary) return;
        memory.diary = true;
        document.getElementById("photo").classList.add("clicked");
        message.innerHTML = "내가 너에게 처음으로 편지를 썼던 다이어리...";
        updateInventory();
    };

    document.getElementById("album").onclick = () => {
        if (memory.album) return;
        memory.album = true;
        document.getElementById("photo").classList.add("clicked");
        message.innerHTML = "함께 여행 다녔던 사진 앨범이야.<br>기억이 하나씩 돌아오고 있어.";
        updateInventory();
    };

    mirror.onclick = () => {
        if (!(memory.photo && memory.diary && memory.album)) {
            message.innerHTML = "아직 떠올려야 할 기억이 더 있는 것 같다...";
            return;
        }

        message.innerHTML = "거울 속으로 손을 뻗는다...";
        
        setTimeout(() => {
            document.getElementById("room").style.transition = "opacity 1.8s";
            document.getElementById("room").style.opacity = "0";
        }, 800);

        setTimeout(() => {
            message.innerHTML = "과거로... 돌아가고 있다.";
            // 여기서 다음 장면으로 넘어가면 됩니다 (나중에 구현)
        }, 2200);
    };
    
    <script>
    // ==================== 기기 감지 + 자동 위치 조정 ====================
    function adjustObjectPositions() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        const isPortrait = height > width;
        const isMobile = width < 500 && isPortrait;
    
        // 기본 위치 (PC나 큰 화면)
        let photoPos = { top: "48%", left: "46.5%" };
        let diaryPos = { top: "71%", left: "46%" };
        let albumPos = { top: "38%", left: "19%" };
        let mirrorPos = { right: "8.5%", top: "31%", width: "125px", height: "305px" };
    
        if (isMobile) {
            // 대부분의 모바일 (S25, iPhone 등 공통)
            photoPos = { top: "44%", left: "46%" };
            diaryPos = { top: "69%", left: "45.5%" };
            albumPos = { top: "37%", left: "18%" };
            mirrorPos = { right: "7%", top: "29%", width: "108px", height: "265px" };
    
            // 아이폰 계열은 화면이 조금 더 넓게 느껴지므로 미세 조정
            if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
                photoPos.left = "47.5%";
                albumPos.left = "19.5%";
                mirrorPos.width = "112px";
            }
        }
    
        // 실제 적용
        document.getElementById("photo").style.top = photoPos.top;
        document.getElementById("photo").style.left = photoPos.left;
    
        document.getElementById("diary").style.top = diaryPos.top;
        document.getElementById("diary").style.left = diaryPos.left;
    
        document.getElementById("album").style.top = albumPos.top;
        document.getElementById("album").style.left = albumPos.left;
    
        const mirror = document.getElementById("mirror");
        mirror.style.right = mirrorPos.right;
        mirror.style.top = mirrorPos.top;
        mirror.style.width = mirrorPos.width;
        mirror.style.height = mirrorPos.height;
    }
    
    // 창 크기 바뀔 때마다 자동으로 다시 조정
    window.addEventListener("resize", adjustObjectPositions);
    window.addEventListener("orientationchange", adjustObjectPositions);
    
    // 페이지 로드될 때 한 번 실행
    window.addEventListener("load", adjustObjectPositions);
    </script>
    updateInventory();
</script>
</body>
</html>
