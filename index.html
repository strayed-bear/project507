<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Project 507</title>
<style>
    body { margin:0; padding:0; background:#111; color:white; font-family:Arial, sans-serif; overflow:hidden; }
    
    #room { position:relative; width:100vw; height:100dvh; }

    .scene { 
        position:absolute; top:0; left:0; width:100%; height:100%; 
        opacity:1; transition:opacity 1.8s ease-in-out; 
        background-size:cover; background-position:center; 
    }
    .scene.hidden { opacity:0; pointer-events:none; }

    .object {
        position:absolute;
        transform:translate(-50%, -50%);
        cursor:pointer;
        padding:12px 16px;
        background:rgba(0,0,0,0.55);
        border-radius:10px;
        font-size:15px;
        transition:all 0.2s;
    }
    .object:hover { background:rgba(255,255,255,0.25); transform:translate(-50%, -50%) scale(1.08); }
    .object.clicked { opacity:0.6; pointer-events:none; }

    /* 거울 */
    #mirror { background:rgba(255,255,255,0.15); border:6px solid #ddd; border-radius:8px; box-shadow:0 0 15px rgba(255,255,255,0.3); }
    .mirror-active { border-color:cyan; box-shadow:0 0 20px cyan, 0 0 40px cyan, 0 0 70px rgba(0,255,255,0.7); animation:mirrorGlow 1.2s ease-in-out infinite alternate; }
    @keyframes mirrorGlow {
        from {filter:brightness(1); transform:translate(-50%, -50%) scale(1);}
        to {filter:brightness(1.5); transform:translate(-50%, -50%) scale(1.03);}
    }

    /* 메시지 */
    #message, #message-classroom, #locker-message {
        position:absolute; bottom:8%; left:5%; right:5%;
        background:rgba(0,0,0,0.82); color:white; 
        padding:18px 24px; border-radius:12px; 
        font-size:1.08rem; line-height:1.55; 
        box-shadow:0 4px 20px rgba(0,0,0,0.6);
    }

    #inventory {
        position:absolute; top:calc(15px + env(safe-area-inset-top)); 
        left:calc(15px + env(safe-area-inset-left));
        background:rgba(0,0,0,0.6); padding:12px 18px; border-radius:10px; font-size:14px;
    }

    /* 사물함 클로즈업 */
    #locker-view {
        position:absolute; top:0; left:0; width:100%; height:100%; 
        background:rgba(0,0,0,0.92); display:none; 
        align-items:center; justify-content:center; z-index:100;
    }
    #locker-closeup {
        width:85%; max-width:520px; height:70vh;
        background:url('./image/locker-closeup.jpg') center/cover;
        border:8px solid #555; border-radius:12px;
        position:relative; box-shadow:0 0 30px rgba(0,0,0,0.8);
    }
</style>
</head>
<body>

<div id="room">
    <!-- 1. 처음 거실 -->
    <div id="scene-living" class="scene" style="background-image:url('./image/living-room-bg.jpg');">
        <div id="inventory">수집한 기억:<br><div id="items"></div></div>
        <div id="photo" class="object">사진</div>
        <div id="diary" class="object">다이어리</div>
        <div id="album" class="object">앨범</div>
        <div id="mirror"></div>
        <div id="message">눈을 뜨니 익숙한 거실이다...<br>주변을 천천히 둘러보자.</div>
    </div>

    <!-- 2. 학교 교실 -->
    <div id="scene-classroom" class="scene hidden" style="background-image:url('./image/school_bg.png');">
        <div id="inventory">수집한 기억:<br><div id="items"></div></div>
        <div id="message-classroom"></div>
        <div id="locker" class="object" style="top:48%; left:22%;">사물함</div>
        <div id="document" class="object" style="top:68%; left:52%;">대학 지원서</div>
    </div>

    <!-- 3. LM2.jpg 집 장면 (마지막 장면) -->
    <!-- 3. LM2.jpg - 바뀐 미래 (경제적으로 힘든 삶) -->
    <div id="scene-living2" class="scene hidden" style="background-image:url('./image/LM2_bg.jpg');">
        <div id="inventory">수집한 기억:<br><div id="items"></div></div>
        <div id="message-living2"></div>
    
        <!-- 오브젝트들 -->
        <div id="graduation-frame" class="object" style="top:38%; left:52%;">졸업증명서</div>
        <div id="debt-papers" class="object" style="top:65%; left:48%;">고지서들</div>
        <div id="window" class="object" style="top:42%; left:78%;">창문</div>
    </div>

    <!-- 사물함 클로즈업 -->
    <div id="locker-view">
        <div id="locker-closeup">
            <div id="postit" class="object" style="top:28%; left:68%; padding:10px 14px; font-size:13px; background:rgba(255,240,180,0.95); color:#333;">포스트잇</div>
            <div id="lock" class="object" style="top:52%; left:52%; padding:14px 28px; font-size:18px; background:#333;">🔒</div>
            <div id="locker-message"></div>
        </div>
    </div>
</div>

<script>
    let memory = { photo:false, diary:false, album:false, tape:false, pen:false };

    const messageLiving = document.getElementById("message");
    const messageClassroom = document.getElementById("message-classroom");
    const messageLiving2 = document.getElementById("message-living2");
    const lockerMessage = document.getElementById("locker-message");
    const items = document.getElementById("items");

    const mirror = document.getElementById("mirror");
    const locker = document.getElementById("locker");
    const lock = document.getElementById("lock");
    const postit = document.getElementById("postit");
    const lockerView = document.getElementById("locker-view");

    function updateInventory() {
        items.innerHTML = `
            사진: ${memory.photo ? "✔" : "❌"}<br>
            다이어리: ${memory.diary ? "✔" : "❌"}<br>
            앨범: ${memory.album ? "✔" : "❌"}<br>
            ${memory.tape ? "수정테이프: ✔" : ""} ${memory.pen ? "볼펜: ✔" : ""}
        `;
    }

    function adjustObjectPositions() {
    // 첫 번째 거실 장면 (맨 처음 배경)
        photo.style.left = "42%";
        photo.style.top = "42%";
        photo.style.transform = "translate(-50%, -50%)";
    
        diary.style.left = "58%";
        diary.style.top = "57%";
        diary.style.transform = "translate(-50%, -50%)";
    
        album.style.left = "33%";
        album.style.top = "65%";
        album.style.transform = "translate(-50%, -50%)";
    
        mirror.style.left = "78%";
        mirror.style.top = "48%";
        mirror.style.width = "18%";
        mirror.style.height = "42%";
        mirror.style.transform = "translate(-50%, -50%)";
    }

    // 거울 클릭 → 교실
    mirror.onclick = () => {
        if (!(memory.photo && memory.diary && memory.album)) {
            messageLiving.innerHTML = "아직 떠올려야 할 기억이 더 있는 것 같다...";
            return;
        }
        messageLiving.innerHTML = "거울 속으로 손을 뻗는다...";
        
        setTimeout(() => {
            document.getElementById("scene-living").classList.add("hidden");
            document.getElementById("scene-classroom").classList.remove("hidden");
            messageClassroom.innerHTML = "교실에 앉아 있다...<br>책상 위에 익숙한 지원서가 놓여 있다.";
        }, 1200);
    };

    // 사물함 클릭
    locker.onclick = () => { lockerView.style.display = "flex"; };

    // 포스트잇 클릭
    postit.onclick = () => {
        lockerMessage.innerHTML = '메모에 "오늘 들을 노래: 케이윌의 오늘부터 1일..."이라고 적혀 있다.';
        lockerMessage.style.display = "block";
        setTimeout(() => { lockerMessage.style.display = "none"; }, 3500);
    };

    // 자물쇠 클릭 → 성공 시 LM2.jpg 집으로 이동
    lock.onclick = () => {
        const pw = prompt("4자리 비밀번호를 입력하세요\n(힌트: 오늘부터 1일 노래 제목)");
        if (pw === null) return;

        if (pw === "0116") {
            alert("자물쇠가 열렸다!");
            lockerView.style.display = "none";
            
            messageClassroom.innerHTML = "수정테이프와 볼펜을 얻었다!";
            memory.tape = true;
            memory.pen = true;
            updateInventory();

            // 2.5초 후 LM2.jpg 집으로 이동
            setTimeout(() => {
                document.getElementById("scene-classroom").classList.add("hidden");
                const living2 = document.getElementById("scene-living2");
                living2.classList.remove("hidden");
                messageLiving2.innerHTML = "집으로 돌아왔다...<br>이제 지원서를 마저 수정할 수 있겠어.";
            }, 2500);
        } else {
            alert("비밀번호가 틀렸다...");
        }
    };

    // 초기화
    window.addEventListener("load", () => {
        setTimeout(() => {
        adjustObjectPositions();
        updateInventory();
    }, 300);   // 0.3초 지연
    });

    // 기존 클릭 이벤트
    photo.onclick = () => { if(!memory.photo){ memory.photo=true; photo.classList.add("clicked"); messageLiving.innerHTML="우리 결혼식 때 찍은 사진이네...<br>너무 행복했었지."; updateInventory(); }};
    diary.onclick = () => { if(!memory.diary){ memory.diary=true; diary.classList.add("clicked"); messageLiving.innerHTML="내가 너에게 처음으로 편지를 썼던 다이어리..."; updateInventory(); }};
    album.onclick = () => { if(!memory.album){ memory.album=true; album.classList.add("clicked"); messageLiving.innerHTML="함께 여행 다녔던 사진 앨범이야.<br>기억이 하나씩 돌아오고 있어."; updateInventory(); }};

    // ==================== LM2 장면 (씁쓸한 미래) ====================
    const graduationFrame = document.getElementById("graduation-frame");
    const debtPapers = document.getElementById("debt-papers");
    const futureWindow = document.getElementById("window");
    
    let checkedObjects = 0;
    const totalObjects = 2; // 졸업증명서 + 고지서
    
    graduationFrame.onclick = () => {
        messageLiving2.innerHTML = "대학 졸업증명서...<br>액자에 예쁘게 걸려 있지만, 지금은 공허하게만 느껴진다.";
        checkedObjects++;
        checkAllObjects();
    };
    
    debtPapers.onclick = () => {
        messageLiving2.innerHTML = "책상 위에 쌓인 고지서와 독촉장들...<br>졸업하고도 경제적으로 너무 힘들다.";
        checkedObjects++;
        checkAllObjects();
    };
    
    function checkAllObjects() {
        if (checkedObjects >= totalObjects) {
            setTimeout(() => {
                messageLiving2.innerHTML = "<strong>내가 원하던 삶은 이런 게 아닌데...</strong><br>미래가 이상하게 바뀌어 버렸어. 이게 아니야!";
            }, 800);
        }
    }
    
    // 창문 클릭 → 회사 장면으로 이동
    futureWindow.onclick = () => {
        if (checkedObjects >= totalObjects) {
            messageLiving2.innerHTML = "오른쪽 창문이 유난히 밝게 빛나고 있다...";
            
            setTimeout(() => {
                document.getElementById("scene-living2").classList.add("hidden");
                
                // comp_bg 회사 장면으로 이동 (새 장면 추가 필요)
                // 아직 scene-company가 없다면 아래처럼 만들어야 합니다.
                alert("창문을 통해 새로운 장면으로 이동합니다... (comp_bg)");
                // 여기서 comp_bg 장면으로 넘어가도록 나중에 구현
            }, 1500);
        } else {
            messageLiving2.innerHTML = "아직 확인하지 않은 것이 있는 것 같다...";
        }
    };

</script>
</body>
</html>
