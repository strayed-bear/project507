<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Project 507</title>

<style>
body { margin:0; padding:0; background:#111; color:white; font-family:Arial, sans-serif; overflow:hidden; }

#room {
    position:relative;
    width:100vw;
    height:100dvh;
    background-image:url('./image/living-room-bg.jpg'); /* ✅ 거실 배경 추가 */
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

/* 장면 공통 */
.scene { position:absolute; top:0; left:0; width:100%; height:100%; opacity:1; transition:opacity 1.5s ease-in-out; }
.scene.hidden { opacity:0; pointer-events:none; }

.object {
    position:absolute;
    transform:translate(-50%, -50%);
    cursor:pointer;
    padding:12px 16px;
    background:rgba(0,0,0,0.55);
    border-radius:10px;
    font-size:15px;
    transition:all 0.2s;
}
.object:hover { background:rgba(255,255,255,0.25); transform:translate(-50%, -50%) scale(1.08); }
.object.clicked { opacity:0.6; pointer-events:none; }

/* 거울 */
#mirror { background:rgba(255,255,255,0.15); border:6px solid #ddd; border-radius:8px; box-shadow:0 0 15px rgba(255,255,255,0.3); }
.mirror-active { border-color:cyan; box-shadow:0 0 20px cyan, 0 0 40px cyan, 0 0 70px rgba(0,255,255,0.7); animation:mirrorGlow 1.2s ease-in-out infinite alternate; }

@keyframes mirrorGlow {
    from {filter:brightness(1); transform:translate(-50%, -50%) scale(1);}
    to {filter:brightness(1.5); transform:translate(-50%, -50%) scale(1.03);}
}

/* 메시지 */
#message {
    position:absolute;
    bottom:calc(8% + env(safe-area-inset-bottom));
    left:5%;
    right:5%;
    background:rgba(0,0,0,0.75);
    padding:18px 25px;
    border-radius:12px;
    font-size:1.1rem;
    line-height:1.5;
}

/* 교실 메시지 */
#message-classroom {
    position:absolute;
    bottom:calc(8% + env(safe-area-inset-bottom));
    left:5%;
    right:5%;
    background:rgba(0,0,0,0.75);
    padding:18px 25px;
    border-radius:12px;
    font-size:1.1rem;
}

/* 인벤토리 */
#inventory {
    position:absolute;
    top:calc(15px + env(safe-area-inset-top));
    left:calc(15px + env(safe-area-inset-left));
    background:rgba(0,0,0,0.6);
    padding:12px 18px;
    border-radius:10px;
    font-size:14px;
}

/* 사물함 클로즈업 */
#locker-view {
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    background:rgba(0,0,0,0.92);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
}

#locker-closeup {
    width:85%;
    max-width:520px;
    border:8px solid #555;
    border-radius:12px;
    background:url('./image/locker-closeup.jpg') center/cover;
    position:relative;
    height:70vh;
    box-shadow:0 0 30px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div id="room">

    <!-- 거실 -->
    <div id="scene-living" class="scene">
        <div id="inventory">수집한 기억:<br><div id="items"></div></div>

        <div id="photo" class="object">사진</div>
        <div id="diary" class="object">다이어리</div>
        <div id="album" class="object">앨범</div>
        <div id="mirror"></div>

        <div id="message">
            눈을 뜨니 익숙한 거실이다...<br>주변을 천천히 둘러보자.
        </div>
    </div>

    <!-- 교실 -->
    <div id="scene-classroom" class="scene hidden"
         style="background-image:url('./image/school_bg.png'); 
                background-size:cover; 
                background-position:center;">

        <div id="inventory">수집한 기억:<br><div id="items"></div></div>
        <div id="message-classroom"></div>

        <div id="locker" class="object" style="top:48%; left:22%;">사물함</div>
        <div id="document" class="object" style="top:68%; left:52%;">대학 지원서</div>
    </div>

    <!-- 사물함 -->
    <div id="locker-view">
        <div id="locker-closeup">

            <div id="postit" class="object"
                 style="top:28%; left:68%; background:rgba(255,240,180,0.95); color:#333;">
                포스트잇
            </div>

            <div id="lock" class="object"
                 style="top:52%; left:52%; background:#333;">
                🔒
            </div>

            <div id="locker-message"></div>
        </div>
    </div>

</div>

<script>
// (JS는 기존 그대로 써도 문제 없음)
</script>

</body>
</html>
