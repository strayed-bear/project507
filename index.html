<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project 507</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
    color:white;
    text-align:center;
}

#room{
    position:relative;
    width:100%;
    height:100vh;
    background:#2a2a2a;
}

.object{
    position:absolute;
    cursor:pointer;
    padding:10px;
    background:#444;
    border-radius:8px;
}

#photo{ top:40%; left:20%; }
#diary{ top:60%; left:50%; }
#album{ top:35%; left:70%; }

#mirror{
    position:absolute;
    right:5%;
    top:20%;
    width:120px;
    height:300px;
    background:#777;
    border:4px solid #aaa;
}

#message{
    position:absolute;
    bottom:20px;
    width:100%;
    font-size:18px;
}

#inventory{
    position:absolute;
    top:10px;
    left:10px;
    text-align:left;
}

.mirror-active{
    box-shadow:0 0 20px cyan;
}
</style>
</head>

<body>

<div id="room">

<div id="inventory">
수집한 기억:
<div id="items"></div>
</div>

<div id="photo" class="object">사진</div>
<div id="diary" class="object">다이어리</div>
<div id="album" class="object">앨범</div>

<div id="mirror"></div>

<div id="message">
물건들을 클릭하여 현재 상황을 파악해보자
</div>

</div>

<script>

let memory = {
    photo:false,
    diary:false,
    album:false
};

const message = document.getElementById("message");
const mirror = document.getElementById("mirror");
const items = document.getElementById("items");

function updateInventory(){
    items.innerHTML = `
    사진: ${memory.photo ? "✔" : "❌"} <br>
    다이어리: ${memory.diary ? "✔" : "❌"} <br>
    앨범: ${memory.album ? "✔" : "❌"}
    `;

    if(memory.photo && memory.diary && memory.album){
        mirror.classList.add("mirror-active");
        message.innerText = "거울이 이상하게 반응하고 있다...";
    }
}

document.getElementById("photo").onclick = () => {
    memory.photo = true;
    message.innerText = "그날 찍은 사진이다.";
    updateInventory();
};

document.getElementById("diary").onclick = () => {
    memory.diary = true;
    message.innerText = "그날의 감정이 적혀 있다.";
    updateInventory();
};

document.getElementById("album").onclick = () => {
    memory.album = true;
    message.innerText = "추억이 담긴 앨범이다.";
    updateInventory();
};

mirror.onclick = () => {

    if(!(memory.photo && memory.diary && memory.album)){
        message.innerText = "아직 떠올릴 기억이 부족하다.";
        return;
    }

    message.innerText = "눈을 감고 거울로 다가간다...";

    setTimeout(()=>{
        document.body.style.background="black";
        message.innerText="...";
    },1000);

    setTimeout(()=>{
        message.innerText="과거로 이동했다.";
    },2500);
};

updateInventory();

</script>

</body>
</html>
